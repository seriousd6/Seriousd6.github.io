<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <title>Offline — Kingdom Bible Study</title>
  <script>try{var t=localStorage.getItem('bsw_theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){}</script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .offline-wrap {
      max-width: 480px;
      margin: 4rem auto;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .offline-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
    }
    .offline-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.75rem;
      color: var(--color-text, #2c2416);
    }
    .offline-msg {
      font-size: 0.95rem;
      color: var(--color-muted, #7a6a55);
      line-height: 1.65;
      margin: 0 0 1.75rem;
    }
    .offline-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .offline-link {
      display: inline-block;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      border: 1.5px solid var(--color-primary, #5c3d1e);
      color: var(--color-primary, #5c3d1e);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
    }
    .offline-link:hover { background: var(--color-primary, #5c3d1e); color: var(--color-on-primary, #fff); }
    .offline-hint {
      font-size: 0.78rem;
      color: var(--color-muted, #aaa);
      font-style: italic;
    }
  </style>
</head>
<body>
  <main>
    <div class="offline-wrap">
      <span class="offline-icon">📖</span>
      <h1 class="offline-title">You're offline</h1>
      <p class="offline-msg">
        No internet connection was found. Cached pages — including the Bible reader,
        verse study, and your notes — are still available below.
      </p>
      <nav class="offline-links" aria-label="Cached pages">
        <a class="offline-link" href="read/">Reader</a>
        <a class="offline-link" href="verse-study/">Verse Study</a>
        <a class="offline-link" href="search/">Search</a>
        <a class="offline-link" href="notes/">My Notes</a>
        <a class="offline-link" href="bookmarks/">Bookmarks</a>
        <a class="offline-link" href="memorize/">Memory</a>
        <a class="offline-link" href="plans/">Plans</a>
        <a class="offline-link" href="library/">Library</a>
      </nav>
      <p class="offline-hint">Reconnect to the internet to access the rest of the site.</p>
    </div>
  </main>
  <script src="assets/js/main.js"></script>
</body>
</html>
