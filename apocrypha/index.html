<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <meta name="description" content="Read complete Catholic, Orthodox, and LXX Bible versions including the full deuterocanonical books — Douay-Rheims, WEB-CE, KJV Apocrypha, Brenton's LXX." />
  <title>Apocrypha — Kingdom Bible Study</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Apocrypha — Kingdom Bible Study" />
  <meta property="og:description" content="Complete Catholic, Orthodox, and LXX Bible editions including Tobit, Judith, Sirach, Wisdom, Maccabees, and all deuterocanonical books." />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Apocrypha — Kingdom Bible Study" />
  <meta name="twitter:description" content="Full Catholic, Orthodox, and LXX Bible — Douay-Rheims, WEB-CE, KJV Apocrypha, Brenton's LXX." />
  <script>try{var t=localStorage.getItem('bsw_theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){}</script>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/bible-ui.css" />
  <link rel="stylesheet" href="../assets/css/reader.css" />
  <link rel="stylesheet" href="../assets/css/apocrypha.css" />
</head>
<body class="reader-page">
  <main>
    <div class="container">
      <div class="apoc-layout">

        <!-- Left sidebar: chapter navigation -->
        <nav id="apoc-sidebar" class="apoc-sidebar" aria-label="Chapter list"></nav>

        <!-- Main content -->
        <div class="apoc-main">

          <!-- Canon filter + browse controls -->
          <div class="apoc-controls">
            <div class="apoc-controls-top">
              <span class="apoc-controls-label" id="apoc-controls-label">Apocrypha</span>
              <div id="apoc-canon-bar" class="apoc-canon-bar" role="group" aria-label="Filter by tradition"></div>
            </div>
            <div class="apoc-browse-bar">
              <select id="apoc-book-select" class="apoc-select apoc-select--book" aria-label="Select book"></select>
              <select id="apoc-ch-select"   class="apoc-select apoc-select--ch"   aria-label="Select chapter" disabled></select>
              <select id="apoc-ver-select"  class="apoc-select apoc-select--ver"  aria-label="Select translation"></select>
            </div>
          </div>

          <!-- Chapter text -->
          <div id="apoc-reader-results" class="apoc-results">
            <p class="apoc-msg">Select a book to begin reading.</p>
          </div>

        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Personal Bible study notes &amp; references.</p>
    </div>
  </footer>

  <script src="../assets/js/main.js"></script>
  <script type="module" src="../assets/js/app.js"></script>
</body>
</html>
