<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <meta name="description" content="Interactive church history timeline from Pentecost to the present — the Apostolic Age, the Fathers, the Councils, the Reformation, and beyond." />
  <title>Church History Timeline — Bible Study</title>
  <script>try{var t=localStorage.getItem('bsw_theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){}</script>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/bible-ui.css" />
  <link rel="stylesheet" href="../assets/css/timeline.css" />
</head>
<body>

  <main>
    <div class="container tl2-page">

      <div class="tl2-header">
        <h1 class="tl2-title">Church History Timeline</h1>
        <p class="tl2-sub">Select an era · then an event · to read details · <a href="../timeline/">← Biblical Timeline</a></p>
        <a class="hist-back-link" href="../history/" id="hist-back-link" hidden>← History</a>
      </div>

      <!-- 3-column layout; id="church-timeline-container" for app.js detection -->
      <div class="tl2-layout" id="church-timeline-container">

        <!-- Column 1: Era spine (always visible) -->
        <div class="tl2-col tl2-col--eras">
          <div class="tl2-col-label">Era</div>
          <div class="tl2-spine-wrap" id="tl2-eras-spine">
            <!-- era nodes injected by JS -->
          </div>
        </div>

        <!-- Column 2: Sub-event spine -->
        <div class="tl2-col tl2-col--events">
          <div class="tl2-col-label" id="tl2-events-label">Events</div>
          <input class="tl2-search" type="search" placeholder="Search events…" aria-label="Search events" />
          <div class="tl2-spine-wrap" id="tl2-events-spine">
            <p class="tl2-placeholder">← Select an era</p>
          </div>
        </div>

        <!-- Column 3: Detail panel -->
        <div class="tl2-col tl2-col--detail">
          <div class="tl2-col-label">Detail</div>
          <div id="tl-detail">
            <p class="tl2-placeholder">← Select an event</p>
          </div>
        </div>

      </div><!-- /.tl2-layout -->
    </div><!-- /.container -->
  </main>

  <script src="../assets/js/main.js"></script>
  <script type="module" src="../assets/js/app.js"></script>
  <script>
    if (new URLSearchParams(location.search).get('minimal')) {
      var bl = document.getElementById('hist-back-link');
      if (bl) bl.removeAttribute('hidden');
    }
  </script>
</body>
</html>
