<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <meta name="description" content="Christian library — browse creeds, confessions, catechisms, and church fathers with filtering and an inline reader." />
  <title>Library — Bible Study</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/bible-ui.css" />
  <link rel="stylesheet" href="../assets/css/library.css" />
  <link rel="stylesheet" href="../assets/css/lib-browser.css" />
</head>
<body class="lb-browser-page">
  <main>
    <div class="container lb-page">

      <div class="lb-header">
        <h1 class="lb-title">Library</h1>
        <p class="lb-sub">Creeds · Confessions · Catechisms · Church Fathers</p>
      </div>

      <div class="lb-layout" id="lb-container">

        <!-- Column 1: Filter panel (collapsible) -->
        <div class="lb-col lb-col--filters">
          <div class="lb-col-label">
            <span class="lb-col-label-text">Filter</span>
            <button class="lb-col-toggle" id="lb-filter-toggle" aria-label="Collapse filters">‹</button>
          </div>
          <div id="lb-filter-panel">
            <!-- filter chips injected by JS -->
          </div>
        </div>

        <!-- Column 2: Document list (collapsible) -->
        <div class="lb-col lb-col--list">
          <div class="lb-col-label lb-list-header">
            <span class="lb-col-label-text">Documents</span>
            <span id="lb-list-count"></span>
            <button class="lb-col-toggle" id="lb-list-toggle" aria-label="Collapse document list">‹</button>
          </div>
          <div id="lb-list-controls">
            <!-- sort control injected by JS -->
          </div>
          <div id="lb-list">
            <!-- document items injected by JS -->
          </div>
        </div>

        <!-- Column 3: Inline reader -->
        <div class="lb-col lb-col--reader">
          <div class="lb-col-label">Reader</div>
          <div id="lb-reader">
            <p class="lb-reader-placeholder">← Select a document</p>
          </div>
        </div>

      </div><!-- /.lb-layout -->

    </div><!-- /.container -->
  </main>

  <footer class="site-footer">
    <div class="container"><p>Personal Bible study notes &amp; references.</p></div>
  </footer>

  <script src="../assets/js/main.js"></script>
  <script type="module" src="../assets/js/app.js"></script>
</body>
</html>
