<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <title>Verse Study — moved to the Reader</title>
  <meta name="robots" content="noindex" />
  <!--
    SD-T5: the standalone verse-study page is retired. Verse study now lives in the reader's
    Passage Study Desk (open with `?study=1`). This stub preserves old/bookmarked
    verse-study/?ref=… links by forwarding them to read/?ref=…&study=1, which opens the desk on
    that verse. Inbound links elsewhere (compare/bookmarks/notes/modal) point straight at the
    reader now; this is the safety net for anything already saved.
  -->
  <script>
    (function () {
      var qs = new URLSearchParams(location.search);
      var ref = qs.get('ref') || '';
      var v = qs.get('v') || '';
      var dest = '../read/';
      var out = new URLSearchParams();
      if (ref) out.set('ref', ref);
      if (v) out.set('v', v);
      out.set('study', '1');
      location.replace(dest + '?' + out.toString());
    })();
  </script>
</head>
<body>
  <main style="max-width:36rem;margin:4rem auto;padding:0 1rem;font-family:system-ui,sans-serif;line-height:1.6">
    <h1 style="font-size:1.3rem">Verse study moved</h1>
    <p>Verse study now opens in the reader’s Passage Study Desk. Redirecting you there…</p>
    <p><a id="vs-fallback" href="../read/?study=1">Open the Reader →</a></p>
  </main>
  <script>
    // Keep the visible fallback link in sync with any ?ref the redirect is forwarding.
    (function () {
      var ref = new URLSearchParams(location.search).get('ref');
      if (ref) document.getElementById('vs-fallback').href = '../read/?ref=' + encodeURIComponent(ref) + '&study=1';
    })();
  </script>
</body>
</html>
