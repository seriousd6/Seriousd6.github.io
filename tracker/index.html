<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <meta name="description" content="35-day discipline history — see which spiritual practices you completed each day." />
  <title>Discipline History — Bible Study</title>
  <script>try{var t=localStorage.getItem('bsw_theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){}</script>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/bible-ui.css" />
  <style>
    .trk-page { max-width: 820px; margin: 0 auto; padding-bottom: 3rem; }
    .trk-page h1 { font-size: 1.6rem; margin-bottom: 0.2rem; }
    .trk-subtitle { color: var(--color-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

    /* Summary stats */
    .trk-summary {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: 8px; padding: 0.9rem 1.2rem; margin-bottom: 1.5rem;
    }
    .trk-stat { display: flex; flex-direction: column; align-items: center; }
    .trk-stat__num { font-size: 1.6rem; font-weight: 800; color: var(--color-primary); line-height: 1; }
    .trk-stat__lbl { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--color-muted); margin-top: 0.2rem; text-align: center; }

    /* Grid */
    .trk-grid-wrap { overflow-x: auto; }
    .trk-grid {
      display: grid;
      /* 8 columns: label + 7 day columns */
      grid-template-columns: 110px repeat(7, 1fr);
      gap: 3px;
      min-width: 500px;
    }

    /* Day-of-week header row */
    .trk-dow {
      font-family: var(--font-ui); font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-muted);
      text-align: center; padding: 0.2rem 0 0.5rem;
    }
    .trk-dow:first-child { /* label spacer */ }

    /* Week separator labels */
    .trk-week-label {
      font-family: var(--font-ui); font-size: 0.7rem; color: var(--color-muted);
      display: flex; align-items: center; padding-right: 0.5rem;
      white-space: nowrap; grid-column: 1;
    }
    .trk-week-label--today { color: var(--color-primary); font-weight: 600; }

    /* Day cell */
    .trk-day {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: 5px; padding: 0.35rem 0.2rem;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      min-height: 52px;
    }
    .trk-day__date {
      font-family: var(--font-ui); font-size: 0.65rem; color: var(--color-muted);
      margin-bottom: 2px; line-height: 1;
    }
    .trk-day--today { border-color: var(--color-primary); background: color-mix(in srgb, var(--color-primary) 4%, transparent); }
    .trk-day--today .trk-day__date { color: var(--color-primary); font-weight: 700; }
    .trk-day--future { opacity: 0.35; }

    /* Discipline dots */
    .trk-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .trk-dot--done  { }
    .trk-dot--miss  { opacity: 0.18; }
    .trk-dot--na    { display: none; } /* future / no data */

    /* Dot colors per discipline */
    .trk-dot--reading    { background: var(--color-primary); }
    .trk-dot--devotional { background: #e67e22; }
    .trk-dot--memory     { background: #2980b9; }
    .trk-dot--prayer     { background: #8e44ad; }
    .trk-dot--reflection { background: #16a085; }
    .trk-dot--worship    { background: #4caf50; }

    /* Legend */
    .trk-legend {
      display: flex; flex-wrap: wrap; gap: 0.75rem 1.2rem;
      margin-top: 1.25rem; padding: 0.75rem 1rem;
      background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 8px;
    }
    .trk-legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: var(--color-text); font-family: var(--font-ui); }
    .trk-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Streak section */
    .trk-streaks {
      display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;
    }
    .trk-streak-card {
      flex: 1; min-width: 140px;
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: 8px; padding: 0.7rem 0.9rem;
      display: flex; align-items: center; gap: 0.7rem;
    }
    .trk-streak-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .trk-streak-info { min-width: 0; }
    .trk-streak-num { font-size: 1.3rem; font-weight: 800; color: var(--color-primary); line-height: 1; }
    .trk-streak-lbl { font-size: 0.72rem; color: var(--color-muted); font-family: var(--font-ui); white-space: nowrap; }
  </style>
</head>
<body>
  <main>
    <div class="container trk-page">
      <a id="trk-back-link" href="../discipline/?tab=history" hidden style="display:inline-block;margin-bottom:.75rem;font-size:.85rem;color:var(--color-primary);text-decoration:none;font-family:var(--font-ui)">← Disciplines</a>
      <h1>✝ Discipline History</h1>
      <p class="trk-subtitle">Last 35 days — each dot represents a completed discipline. <a href="../" style="color:var(--color-primary)">← Home</a></p>

      <div class="trk-summary" id="trk-summary"></div>
      <div class="trk-streaks" id="trk-streaks"></div>

      <div class="trk-grid-wrap">
        <div class="trk-grid" id="trk-grid"></div>
      </div>

      <div class="trk-legend" id="trk-legend"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Personal Bible study notes &amp; references.</p>
    </div>
  </footer>

  <script src="../assets/js/main.js"></script>
  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
  import { getToday, isReadingDone, isDone, isPrayerDone, isReflectionDone, isWorshipDone, _todayStr } from '../assets/js/tracker.js';

  var DISCIPLINES = [
    { key: 'reading',    label: 'Reading Plan',    cls: 'trk-dot--reading',    weekly: false },
    { key: 'devotional', label: 'Devotional',       cls: 'trk-dot--devotional', weekly: false },
    { key: 'memory',     label: 'Memory Review',    cls: 'trk-dot--memory',     weekly: false },
    { key: 'prayer',     label: 'Prayer Journal',   cls: 'trk-dot--prayer',     weekly: false },
    { key: 'reflection', label: 'Study Reflection', cls: 'trk-dot--reflection', weekly: false },
    { key: 'worship',    label: 'Worship (Sunday)', cls: 'trk-dot--worship',    weekly: true  },
  ];

  var TOTAL_BIBLE_CH = 1189;

  function dateStr(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function getDoneForDate(dateS) {
    return {
      reading:    isReadingDone(dateS),
      devotional: isDone('devotional', dateS),
      memory:     isDone('memory', dateS),
      prayer:     isPrayerDone(dateS),
      reflection: isReflectionDone(dateS),
      worship:    isWorshipDone(dateS),
    };
  }

  function calcStreak(key, days) {
    // Count consecutive days (from today backwards) where discipline was done
    var streak = 0;
    for (var i = 0; i < days.length; i++) {
      if (days[i].done[key]) streak++;
      else break;
    }
    return streak;
  }

  function render() {
    var today = _todayStr();
    var todayDate = new Date(today + 'T00:00:00');

    // Build 35 days: today at index 0, going back
    var days = [];
    for (var i = 0; i < 35; i++) {
      var d = new Date(todayDate.getTime() - i * 86400000);
      var ds = dateStr(d);
      days.push({ date: d, dateStr: ds, isFuture: false, done: getDoneForDate(ds) });
    }

    // Summary
    var summaryEl = document.getElementById('trk-summary');
    var totalDone = 0, fullDays = 0;
    days.forEach(function (day) {
      var count = Object.values(day.done).filter(Boolean).length;
      totalDone += count;
      if (count >= 5) fullDays++; // 5+ disciplines = full day
    });
    var readData = JSON.parse(localStorage.getItem('bsw_chapter_read') || '{}');
    var chaptersRead = Object.values(readData).reduce(function (sum, b) { return sum + Object.keys(b).length; }, 0);

    summaryEl.innerHTML =
      '<div class="trk-stat"><span class="trk-stat__num">' + totalDone + '</span><span class="trk-stat__lbl">Completions<br>(35 days)</span></div>' +
      '<div class="trk-stat"><span class="trk-stat__num">' + fullDays + '</span><span class="trk-stat__lbl">Full days<br>(5+ disciplines)</span></div>' +
      '<div class="trk-stat"><span class="trk-stat__num">' + days.filter(function (d) { return d.done.reading; }).length + '</span><span class="trk-stat__lbl">Reading days</span></div>' +
      '<div class="trk-stat"><span class="trk-stat__num">' + chaptersRead + '</span><span class="trk-stat__lbl">Chapters read<br>all time</span></div>' +
      '<div class="trk-stat"><span class="trk-stat__num">' + Math.round(chaptersRead / TOTAL_BIBLE_CH * 100) + '%</span><span class="trk-stat__lbl">Bible coverage</span></div>';

    // Streaks
    var streakEl = document.getElementById('trk-streaks');
    streakEl.innerHTML = '';
    DISCIPLINES.forEach(function (d) {
      var s = calcStreak(d.key, days);
      var card = document.createElement('div');
      card.className = 'trk-streak-card';
      card.innerHTML =
        '<div class="trk-streak-dot ' + d.cls + '"></div>' +
        '<div class="trk-streak-info">' +
          '<div class="trk-streak-num">' + s + '</div>' +
          '<div class="trk-streak-lbl">' + d.label + ' streak</div>' +
        '</div>';
      streakEl.appendChild(card);
    });

    // Grid — arrange 35 days into 5 weeks of 7 columns
    // Start on the most recent Sunday boundary so weeks align
    var gridEl = document.getElementById('trk-grid');
    gridEl.innerHTML = '';

    // Day-of-week header
    gridEl.appendChild(_el('div', 'trk-dow', '')); // spacer
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function (dow) {
      gridEl.appendChild(_el('div', 'trk-dow', dow));
    });

    // Build a 5×7 grid anchored so today's DOW aligns correctly
    var todayDow = todayDate.getDay(); // 0=Sun … 6=Sat
    // The last cell of the grid is always today's DOW + next Saturday
    // Pad grid to always show full 5 weeks starting from a Sunday
    var gridStart = new Date(todayDate.getTime() - (todayDow + 28) * 86400000);

    // Build lookup map date→done
    var doneMap = {};
    days.forEach(function (d) { doneMap[d.dateStr] = d.done; });

    for (var week = 0; week < 5; week++) {
      var weekStart = new Date(gridStart.getTime() + week * 7 * 86400000);
      var weekEndDate = new Date(weekStart.getTime() + 6 * 86400000);
      var isCurrentWeek = today >= dateStr(weekStart) && today <= dateStr(weekEndDate);
      var lbl = _el('div', 'trk-week-label' + (isCurrentWeek ? ' trk-week-label--today' : ''),
        (weekStart.getMonth() + 1) + '/' + weekStart.getDate());
      gridEl.appendChild(lbl);

      for (var dow = 0; dow < 7; dow++) {
        var cellDate = new Date(weekStart.getTime() + dow * 86400000);
        var cellStr  = dateStr(cellDate);
        var isFuture = cellStr > today;
        var isToday  = cellStr === today;
        var done     = doneMap[cellStr] || null;

        var cell = document.createElement('div');
        cell.className = 'trk-day' + (isToday ? ' trk-day--today' : '') + (isFuture ? ' trk-day--future' : '');

        var dateLabel = _el('div', 'trk-day__date', cellDate.getDate().toString());
        cell.appendChild(dateLabel);

        DISCIPLINES.forEach(function (disc) {
          var dot = document.createElement('div');
          dot.className = 'trk-dot ' + disc.cls;
          if (isFuture || !done) {
            dot.className += ' trk-dot--na';
          } else if (done[disc.key]) {
            dot.className += ' trk-dot--done';
            dot.title = disc.label + ' ✓';
          } else {
            dot.className += ' trk-dot--miss';
            dot.title = disc.label + ' ✗';
          }
          cell.appendChild(dot);
        });

        gridEl.appendChild(cell);
      }
    }

    // Legend
    var legendEl = document.getElementById('trk-legend');
    legendEl.innerHTML = '';
    DISCIPLINES.forEach(function (d) {
      var item = document.createElement('div');
      item.className = 'trk-legend-item';
      item.innerHTML = '<div class="trk-legend-dot ' + d.cls + '"></div>' + d.label;
      legendEl.appendChild(item);
    });
  }

  function _el(tag, cls, text) {
    var el = document.createElement(tag);
    el.className = cls;
    el.textContent = text;
    return el;
  }

  render();
  </script>
</body>
</html>
