<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <meta name="description" content="Read the Bible by reference with version switching." />
  <title>The Holy Bible — Bible Study</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" id="bsw-og-title" content="The Holy Bible — Bible Study" />
  <meta property="og:description" id="bsw-og-desc" content="Read the Bible by reference with version switching." />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" id="bsw-tw-title" content="The Holy Bible — Bible Study" />
  <meta name="twitter:description" id="bsw-tw-desc" content="Read the Bible by reference with version switching." />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/bible-ui.css" />
  <link rel="stylesheet" href="../assets/css/reader.css" />
</head>
<body class="reader-page">
  <main>
    <div class="container">
      <div class="reader-layout">

        <nav id="reader-sidebar" class="reader-sidebar" aria-label="Chapter list"></nav>

        <div class="reader-main">
          <div class="reader-controls">
            <div class="reader-lookup-bar">
              <input id="reader-lookup-input" class="reader-lookup-input" type="search"
                placeholder="Gen 1; John 3:16-21; Rom 8:28, 38-39"
                autocomplete="off" spellcheck="false" aria-label="Go to Bible reference" />
              <button id="reader-lookup-btn" class="reader-lookup-btn">Go</button>
              <span id="reader-lookup-status" class="reader-lookup-status" aria-live="polite"></span>
            </div>
            <div class="reader-browse-bar">
              <label class="reader-browse-label" for="reader-book-select">Browse:</label>
              <select id="reader-book-select" class="reader-browse-select" aria-label="Select book">
                <option value="">Book…</option>
              </select>
              <select id="reader-ch-select" class="reader-browse-select" aria-label="Select chapter" disabled>
                <option value="">Ch…</option>
              </select>
              <span class="reader-browse-hint">j / → next chapter &nbsp;·&nbsp; k / ← prev</span>
            </div>
          </div>

          <div id="reader-results" class="reader-results"></div>
        </div>

        <aside id="reader-xref-panel" class="reader-xref-panel" aria-label="Cross-references"></aside>

      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Personal Bible study notes &amp; references.</p>
    </div>
  </footer>

    <script src="../assets/js/main.js"></script>
    <script type="module" src="../assets/js/app.js"></script>
</body>
</html>
