name: Validate

# Cheap, fast integrity gate for a data-heavy, multi-agent repo. Runs the data-integrity
# assertions, the library format validator, and (since the Astro migration) a site build
# on every push / PR. This is the project's main automated safety net.

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator dependencies
        run: pip install beautifulsoup4

      - name: Data integrity checks
        run: python3 scripts/validate-data.py

      - name: Library format (v2 standard)
        run: python3 scripts/validate-library-format.py --all

      - name: JS syntax (node --check on all modules)
        run: |
          if command -v node >/dev/null 2>&1; then
            for f in assets/js/*.js assets/js/entries/*.js sw.js tools/*.mjs; do node --check "$f"; done
          else
            echo "node unavailable; skipping JS syntax check"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Astro build
        run: |
          npm ci
          npm run build
