name: Deploy (Astro)

# Builds the Astro site and deploys it to GitHub Pages (kingdombiblestudy.com).
# Cutover completed 2026-07-11: Pages Source is "GitHub Actions" and src/pages/
# is the single source of truth for page HTML. Every push to master (including
# the hourly data auto-sync) redeploys. Rollback: rerun a previous successful
# run of this workflow, or `git revert` and push.
#
# The copy step below must stay in sync with STATIC_DIRS / STATIC_FILES in
# tools/root-statics.mjs (the dev-server equivalent) and VERBATIM_PAGES in
# tools/convert-pages.mjs.

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build site
        run: |
          npm ci
          npm run build

      - name: Copy legacy static tree into dist
        run: |
          cp -r assets data dist/
          cp sw.js manifest.json favicon.ico favicon.svg offline.html dist/
          # Authoring scaffolds (Astro skips _-prefixed routes)
          mkdir -p dist/topics dist/study-guides
          cp -r topics/_template topics/_template-book dist/topics/
          cp -r study-guides/_template dist/study-guides/
          # Redirect/retirement stubs excluded from Astro conversion
          for stub in devotionals journal memorize plans reflections worship word verse-study; do
            mkdir -p "dist/$stub"
            cp "$stub/index.html" "dist/$stub/"
          done
          cp topics/index.html dist/topics/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
