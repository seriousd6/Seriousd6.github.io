name: Deploy (Astro)

# Builds the Astro site and deploys it to GitHub Pages (kingdombiblestudy.com).
# Cutover completed 2026-07-11: Pages Source is "GitHub Actions" and src/pages/
# is the single source of truth for page HTML. Every push to master (including
# the hourly data auto-sync) redeploys. Rollback: rerun a previous successful
# run of this workflow, or `git revert` and push.
#
# Phase 3 (2026-07-11): `npm run build` = astro build + tools/build-assets.mjs.
# The asset step bundles/minifies assets/js through Vite (stable entry URLs,
# hashed chunks), minifies assets/css in place, and writes dist/sw.js with a
# regenerated precache list + content-hash APP_CACHE_V. The copy step below
# only handles what the build doesn't: data/, scaffolds, and verbatim stubs.
# It must stay in sync with STATIC_DIRS / STATIC_FILES in tools/root-statics.mjs
# (the dev-server equivalent).

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build site
        run: |
          npm ci
          npm run build

      - name: Copy remaining static tree into dist
        run: |
          # assets/, sw.js, manifest, favicons, offline.html are emitted by
          # tools/build-assets.mjs (npm run build) — only data/ + verbatim HTML here.
          cp -r data dist/
          # Authoring scaffolds (Astro skips _-prefixed routes)
          mkdir -p dist/topics dist/study-guides
          cp -r topics/_template topics/_template-book dist/topics/
          cp -r study-guides/_template dist/study-guides/
          # Redirect/retirement stubs excluded from Astro conversion
          for stub in devotionals journal memorize plans reflections worship word verse-study; do
            mkdir -p "dist/$stub"
            cp "$stub/index.html" "dist/$stub/"
          done
          cp topics/index.html dist/topics/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
